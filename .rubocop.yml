AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.1

Metrics/AbcSize:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

# Dynamic global-variable access in Ruby still requires eval.
Security/Eval:
  Enabled: false

# Kapusta deliberately exposes Ruby class variables through `cvar`.
Style/ClassVars:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/ReturnNil:
  Enabled: true
  EnforcedStyle: return

Metrics/ParameterLists:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*.rb'

Style/HashSyntax:
  EnforcedShorthandSyntax: always
