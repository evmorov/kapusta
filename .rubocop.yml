AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.1
  Exclude:
    - 'examples-compiled/**/*'

Metrics/AbcSize:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Lint/NumberConversion:
  Enabled: true

# Dynamic global-variable access in Ruby still requires eval.
Security/Eval:
  Enabled: false

# Kapusta deliberately exposes Ruby class variables through `cvar`.
Style/ClassVars:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/ReturnNil:
  Enabled: true
  EnforcedStyle: return

Metrics/ParameterLists:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*.rb'

Style/HashSyntax:
  EnforcedShorthandSyntax: always

Layout/ExtraSpacing:
  AllowBeforeTrailingComments: false
  AllowForAlignment: false

# Rules for checking emmited Ruby examples (keep them commented out):

# Style/StringLiterals:
#   Enabled: false

# Layout/SpaceInsideHashLiteralBraces:
#   Enabled: false

# Style/FrozenStringLiteralComment:
#   Enabled: false

# Style/HashSyntax:
#   Enabled: false

# Style/StringConcatenation:
#   Enabled: false

# Style/NumericPredicate:
#   Enabled: false

# Style/TrivialAccessors:
#   Enabled: false

# Style/EvenOdd:
#   Enabled: false

# Layout/IndentationWidth:
#   Enabled: false

# Layout/EndAlignment:
#   Enabled: false

# Layout/ElseAlignment:
#   Enabled: false

# Style/WordArray:
#   Enabled: false
